<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Car Registration Form</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>Car Registration Form</h1>
</header>

<main>
    <section class="form-section">
        <form class="form">

            <div class="form-group">
                <label for="carName">Car Name</label>
                <input type="text" id="carName" class="input-field" placeholder="Enter car name">
            </div>

            <div class="form-group">
                <label for="model">Model</label>
                <input type="text" id="model" class="input-field" placeholder="Enter model">
            </div>

            <div class="form-group">
                <label for="price">Price</label>
                <input type="text" id="price" class="input-field" placeholder="Enter price">
            </div>

            <div class="form-group">
                <label for="serviceType">Service Type</label>
                <select id="serviceType" class="input-field">
                    <option value="">Select service</option>
                    <option value="rent">Rent</option>
                    <option value="sale">Sale</option>
                </select>
            </div>

            <div class="form-group">
                <label for="carImage">Upload Image</label>
                <input type="file" id="carImage" class="input-field">
            </div>

            <div class="form-group">
                <button type="submit" class="submit-btn">Submit</button>
            </div>

        </form>
    </section>
</main>

<footer>
    <p>Car Registration System</p>
</footer>

<script src="script.js"></script>

</body>
</html>
